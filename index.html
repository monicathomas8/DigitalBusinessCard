<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Digital Business Card</title>
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body>
        <main class="card">
            <header class="card-header">
                <!-- Avatar -->
                <div class="avatar">Photo</div>
                <h1 class="name">Your Name</h1>
                <p class="title">Your Job Title</p>
                <div class="contact-info">
                    <!-- Contact information -->
                    <p>📱 <a href="tel:+10000000000">Phone Number</a></p> <!-- Add in contect info-->
                    <p>✉️ <a href="mailto:you@example.com">you@example.com</a></p> <!-- Add in contect info-->
                </div>
            </header>
            <!-- Action buttons -->
            <section class="actions">
                <button id="connectBtn" class="button button--main">🤝 Connect with Me</button>
                <button id="saveBtn" class="button button--secondary">💾 Save My Contact</button>
            </section>
            <!-- Hidden Save message -->
            <p id="saveMessage" class="save-message"></p>
            <!-- Social media links -->
            <section class="links">
                <a href="#" class="link-row"> <!-- change placeholder links -->
                    <span>LinkedIn</span>
                    <span class="arrow">→</span>
                </a>
                <a href="#" class="link-row">
                    <span>Instagram</span>
                    <span class="arrow">→</span>
                </a>
                <a href="#" class="link-row">
                    <span>TikTok</span>
                    <span class="arrow">→</span>
                </a>
                <a href="#" class="link-row">
                    <span>Website</span>
                    <span class="arrow">→</span>
                </a>
                <a href="#" class="link-row">
                    <span>My Services</span>
                    <span class="arrow">→</span>
                </a>
            </section>

            <!-- Footer -->
            <footer class="card-footer">
                <p>Made with ☕ and 💻 by <a href="https://www.monica-webdeveloper.com/" target="_blank" rel="noopener">Monica | Web Developer</a></p>
                <p class="copyright">© 2026 Your Name. All rights reserved.</p>
            </footer>
        </main>

        <!-- Connect popup (hidden by default) -->
        <div id="connectModal" class="modal-overlay hidden">
            <div class="modal">
                <button class="modal-close" id="closeConnect">✕</button>
                <h2>Let's Connect</h2>
                <form id="connectForm">
                    <input type="text" name="name" placeholder="Their name" required>
                    <input type="text" name="contact" placeholder="Phone or email" required>
                    <textarea name="note" placeholder="Note (optional)"></textarea>
                    <button type="submit" class="button button--main">Send</button>
                </form>
                <p id="connectSuccess" class="success-message hidden">Thanks! Message sent.</p>
            </div>
        </div>

        <script src="assets/js/script.js"></script>
    </body>
</html>
